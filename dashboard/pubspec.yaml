name: kaapav_ad_engine
description: KAAPAV Ad Engine — Meta Ads ROAS Optimization Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.7.2

  # Supabase
  supabase_flutter: ^2.8.3

  # HTTP & API
  dio: ^5.7.0

  # Charts
  fl_chart: ^0.70.2

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true